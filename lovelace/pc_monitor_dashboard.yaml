title: PC Monitor
path: pc-monitor
icon: mdi:desktop-tower-monitor
cards:

  # ── Header row: CPU + RAM gauges ─────────────────────────────────────────

  - type: horizontal-stack
    cards:
      - type: gauge
        entity: sensor.pc_cpu_temperature
        name: CPU Temp
        unit: "°C"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#2196F3"   # blue — cold
          - from: 30
            color: "#4CAF50"   # green — normal
          - from: 57
            color: "#FF9800"   # orange — warm
          - from: 75
            color: "#F44336"   # red — hot

      - type: gauge
        entity: sensor.pc_cpu_load
        name: CPU Load
        unit: "%"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#4CAF50"
          - from: 60
            color: "#FF9800"
          - from: 85
            color: "#F44336"

      - type: gauge
        entity: sensor.pc_ram_used
        name: RAM
        unit: "%"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#4CAF50"
          - from: 70
            color: "#FF9800"
          - from: 90
            color: "#F44336"

  # ── GPU row (remove if no GPU) ────────────────────────────────────────────

  - type: horizontal-stack
    cards:
      - type: gauge
        entity: sensor.pc_gpu_temperature
        name: GPU Temp
        unit: "°C"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#2196F3"
          - from: 40
            color: "#4CAF50"
          - from: 70
            color: "#FF9800"
          - from: 85
            color: "#F44336"

      - type: gauge
        entity: sensor.pc_gpu_load
        name: GPU Load
        unit: "%"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#4CAF50"
          - from: 60
            color: "#FF9800"
          - from: 85
            color: "#F44336"

      - type: gauge
        entity: sensor.pc_gpu_vram_used
        name: VRAM
        unit: "%"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#4CAF50"
          - from: 70
            color: "#FF9800"
          - from: 90
            color: "#F44336"

  # ── History graphs ────────────────────────────────────────────────────────

  - type: history-graph
    title: CPU Temperature (24h)
    hours_to_show: 24
    entities:
      - entity: sensor.pc_cpu_temperature
        name: CPU Temp

  - type: history-graph
    title: CPU Load & RAM (24h)
    hours_to_show: 24
    entities:
      - entity: sensor.pc_cpu_load
        name: CPU Load
      - entity: sensor.pc_ram_used
        name: RAM Used

  # ── Disk & Network ────────────────────────────────────────────────────────

  - type: horizontal-stack
    cards:
      - type: entities
        title: Disk
        entities:
          - entity: sensor.pc_disk_used_root
            name: Used (root) %
          - entity: sensor.pc_disk_free_root
            name: Free (root) GB

      - type: entities
        title: Network (eth0)
        entities:
          - entity: sensor.pc_network_download_eth0
            name: Download
          - entity: sensor.pc_network_upload_eth0
            name: Upload

  # ── RAM numeric detail ────────────────────────────────────────────────────

  - type: entities
    title: Memory Detail
    entities:
      - entity: sensor.pc_ram_used
        name: RAM Used %
      - entity: sensor.pc_ram_used_gb
        name: RAM Used GB
