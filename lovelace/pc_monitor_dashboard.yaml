title: PC
path: pc
icon: mdi:desktop-classic
type: custom:grid-layout
layout:
  grid-template-columns: 33.3% 33.3% 33.3%
  grid-template-rows: auto
  grid-gap: 8px
  padding: 8px
  mediaquery:
    "(max-width: 1100px)":
      grid-template-columns: 50% 50%
    "(max-width: 700px)":
      grid-template-columns: 100%
cards:
  - type: vertical-stack
    cards:
      - type: heading
        heading: 🖥️ Processore (CPU)
      - type: gauge
        entity: sensor.pc_cpu_temperature
        name: Temp
        unit: °C
        needle: true
        segments:
          - from: 0
            color: "#2196F3"
          - from: 33.3
            color: "#4CAF50"
          - from: 63.3
            color: "#FF9800"
          - from: 83.3
            color: "#F44336"
      - type: gauge
        entity: sensor.pc_cpu_usage
        name: Utilizzo
        unit: "%"
        needle: true
      - type: history-graph
        entities:
          - entity: sensor.pc_cpu_temperature
        hours_to_show: 24
  - type: vertical-stack
    cards:
      - type: heading
        heading: 🎮 Grafica (GPU)
      - type: gauge
        entity: sensor.pc_gpu_temperature
        name: Temp GPU
        unit: °C
        needle: true
        segments:
          - from: 0
            color: "#2196F3"
          - from: 40
            color: "#4CAF50"
          - from: 70
            color: "#FF9800"
          - from: 85
            color: "#F44336"
      - type: gauge
        entity: sensor.pc_gpu_usage
        name: Carico GPU
        unit: "%"
        needle: true
      - type: gauge
        entity: sensor.pc_gpu_vram_used
        name: VRAM Usata
        unit: "%"
        needle: true
  - type: vertical-stack
    cards:
      - type: heading
        heading: 💾 Memoria & Risorse
      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.pc_ram_used
            name: RAM Usata %
          - entity: sensor.pc_ram_used_gb
            name: RAM Usata GB
          - type: divider
          - entity: sensor.pc_disk_used_root
            name: Disco Usato %
          - entity: sensor.pc_disk_free_root
            name: Disco Libero GB
      - type: entities
        title: Rete
        entities:
          - entity: sensor.pc_network_download_eth0
            name: ⬇️ Down
          - entity: sensor.pc_network_upload_eth0
            name: ⬆️ Up
      - type: history-graph
        entities:
          - entity: sensor.pc_ram_used
        hours_to_show: 24

  # ── LED Control ─────────────────────────────────────────────────────────────
  # Replace REPLACE_WITH_YOUR_LED_ENTITY with your actual light entity ID.
  # When the toggle is ON the blueprint automation controls the LED color
  # from the sensor. When OFF the light card below allows free color picking.
  - type: vertical-stack
    cards:
      - type: heading
        heading: 💡 Controllo LED
      - type: entities
        entities:
          - entity: input_boolean.pc_led_sensor_mode
            name: Modalità Automatica
      - type: conditional
        conditions:
          - entity: input_boolean.pc_led_sensor_mode
            state: "on"
        card:
          type: entities
          show_header_toggle: false
          entities:
            - entity: sensor.pc_cpu_temperature
              name: "🌡️ Sensore attivo"
      - type: conditional
        conditions:
          - entity: input_boolean.pc_led_sensor_mode
            state: "off"
        card:
          type: light
          entity: light.REPLACE_WITH_YOUR_LED_ENTITY
