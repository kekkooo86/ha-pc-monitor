blueprint:
  name: PC Metric LED Color
  description: >
    Changes the color of an RGB light based on a numeric PC metric published
    by sysmon-mqtt (https://github.com/kekkooo86/sysmon-mqtt).

    Gauge-aligned color interpolation based on a configurable maximum value:
      - 0% → low_threshold_pct       → cold_color → warm_color
      - low_threshold_pct → mid_threshold_pct   → warm_color → hot_color
      - mid_threshold_pct → high_threshold_pct  → hot_color → critical_color
      - ≥ high_threshold_pct                     → critical_color

    The automation triggers on every state change of the selected metric sensor.
    No input_number helper is required.

  domain: automation
  source_url: https://github.com/kekkooo86/ha-pc-monitor/blob/main/blueprints/automation/cpu_temp_led_color.yaml

  input:
    cpu_temp_sensor:
      name: Metric Sensor
      description: >
        The numeric sensor to monitor from sysmon-mqtt via MQTT.
        For example, you can use the default CPU temperature sensor
        or a percentage sensor such as CPU usage.
      selector:
        entity:
          domain: sensor

    rgb_light:
      name: RGB Light
      description: The RGB light entity to control.
      selector:
        entity:
          domain: light

    metric_max:
      name: Maximum metric value
      description: >
        Absolute maximum expected for the selected sensor.
        Example: for CPU temperature you might set 90.
      default: 90
      selector:
        number:
          min: 1
          max: 1000

    low_threshold_pct:
      name: Low threshold percentage
      description: >
        Percentage of the maximum metric value where the LED reaches
        the warm color.
      default: 33.3
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: "%"

    mid_threshold_pct:
      name: Mid threshold percentage
      description: >
        Percentage of the maximum metric value where the LED reaches
        the hot color.
      default: 63.3
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: "%"

    high_threshold_pct:
      name: High threshold percentage
      description: >
        Percentage of the maximum metric value where the LED reaches
        the critical color and stays there above this point.
      default: 83.3
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: "%"

    color_cold:
      name: Cold color
      description: Default matches the first gauge segment color.
      default: [33, 150, 243]
      selector:
        color_rgb:

    color_warm:
      name: Warm color
      description: Default matches the second gauge segment color.
      default: [76, 175, 80]
      selector:
        color_rgb:

    color_hot:
      name: Hot color
      description: Default matches the third gauge segment color.
      default: [255, 152, 0]
      selector:
        color_rgb:

    color_critical:
      name: Critical color
      description: Default matches the fourth gauge segment color.
      default: [244, 67, 54]
      selector:
        color_rgb:

trigger:
  - platform: state
    entity_id: !input cpu_temp_sensor

variables:
  metric_max_value: !input metric_max
  low_threshold_percent: !input low_threshold_pct
  mid_threshold_percent: !input mid_threshold_pct
  high_threshold_percent: !input high_threshold_pct
  cold_color: !input color_cold
  warm_color: !input color_warm
  hot_color: !input color_hot
  critical_color: !input color_critical

condition:
  - condition: template
    value_template: >
      {{
        trigger.to_state is not none
        and (trigger.to_state.state | float(none)) is not none
        and (metric_max_value | float(0)) > 0
      }}

action:
  - service: light.turn_on
    target:
      entity_id: !input rgb_light
    data:
      rgb_color: >
        {% set metric = states(trigger.entity_id) | float %}
        {% set minimum = 0 %}
        {% set max_metric = metric_max_value | float %}
        {% set low = max_metric * ((low_threshold_percent | float) / 100) %}
        {% set mid = max_metric * ((mid_threshold_percent | float) / 100) %}
        {% set high = max_metric * ((high_threshold_percent | float) / 100) %}

        {% macro lerp(t, t0, t1, c0, c1) %}
          {% set span = (t1 - t0) %}
          {% if span <= 0 %}
            {{ c1[0] }}, {{ c1[1] }}, {{ c1[2] }}
          {% else %}
            {% set ratio_raw = ((t - t0) / span) %}
            {% if ratio_raw < 0 %}
              {% set ratio = 0 %}
            {% elif ratio_raw > 1 %}
              {% set ratio = 1 %}
            {% else %}
              {% set ratio = ratio_raw %}
            {% endif %}
            {{ (c0[0] + (c1[0] - c0[0]) * ratio) | round(0) | int }},
            {{ (c0[1] + (c1[1] - c0[1]) * ratio) | round(0) | int }},
            {{ (c0[2] + (c1[2] - c0[2]) * ratio) | round(0) | int }}
          {% endif %}
        {% endmacro %}

        {% if metric <= low %}
          [{{ lerp(metric, minimum, low, cold_color, warm_color) }}]
        {% elif metric <= mid %}
          [{{ lerp(metric, low, mid, warm_color, hot_color) }}]
        {% elif metric <= high %}
          [{{ lerp(metric, mid, high, hot_color, critical_color) }}]
        {% else %}
          {{ critical_color }}
        {% endif %}

mode: single
