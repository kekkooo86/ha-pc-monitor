blueprint:
  name: PC Metric LED Color
  description: >
    Changes the color of an RGB light based on a numeric PC metric published
    by sysmon-mqtt (https://github.com/kekkooo86/sysmon-mqtt).

    Gauge-aligned color interpolation based on a configurable maximum value:
      - 0% → low_threshold_pct       → cold_color → warm_color
      - low_threshold_pct → mid_threshold_pct   → warm_color → hot_color
      - mid_threshold_pct → high_threshold_pct  → hot_color → critical_color
      - ≥ high_threshold_pct                     → critical_color

    The automation triggers on every state change of the selected metric sensor.
    No input_number helper is required.

  domain: automation
  source_url: https://github.com/kekkooo86/ha-pc-monitor/blob/main/blueprints/automation/cpu_temp_led_color.yaml

  input:
    cpu_temp_sensor:
      name: Metric Sensor
      description: >
        The numeric sensor to monitor from sysmon-mqtt via MQTT.
        For example, you can use the default CPU temperature sensor
        or a percentage sensor such as CPU usage.
      selector:
        entity:
          domain: sensor

    rgb_light:
      name: RGB Light
      description: The RGB light entity to control.
      selector:
        entity:
          domain: light

    metric_max:
      name: Maximum metric value
      description: >
        Absolute maximum expected for the selected sensor.
        Example: for CPU temperature you might set 90.
      default: 90
      selector:
        number:
          min: 1
          max: 1000

    low_threshold_pct:
      name: Low threshold percentage
      description: >
        Percentage of the maximum metric value where the LED reaches
        the warm color.
      default: 33.3
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: "%"

    mid_threshold_pct:
      name: Mid threshold percentage
      description: >
        Percentage of the maximum metric value where the LED reaches
        the hot color.
      default: 63.3
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: "%"

    high_threshold_pct:
      name: High threshold percentage
      description: >
        Percentage of the maximum metric value where the LED reaches
        the critical color and stays there above this point.
      default: 83.3
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: "%"

    color_cold:
      name: Cold color
      description: Default matches the first gauge segment color.
      default: [33, 150, 243]
      selector:
        color_rgb:

    color_warm:
      name: Warm color
      description: Default matches the second gauge segment color.
      default: [76, 175, 80]
      selector:
        color_rgb:

    color_hot:
      name: Hot color
      description: Default matches the third gauge segment color.
      default: [255, 152, 0]
      selector:
        color_rgb:

    color_critical:
      name: Critical color
      description: Default matches the fourth gauge segment color.
      default: [244, 67, 54]
      selector:
        color_rgb:

    led_mode_toggle:
      name: LED Sensor Mode toggle (optional)
      description: >
        If set, the automation only runs when this boolean helper is ON.
        When OFF, the automation is skipped — allowing manual light control.
        Leave empty to always run regardless of any toggle.
      default: {}
      selector:
        entity:
          domain: input_boolean

trigger:
  - platform: state
    entity_id: !input cpu_temp_sensor

variables:
  metric_max_value: !input metric_max
  low_threshold_percent: !input low_threshold_pct
  mid_threshold_percent: !input mid_threshold_pct
  high_threshold_percent: !input high_threshold_pct
  cold_color: !input color_cold
  warm_color: !input color_warm
  hot_color: !input color_hot
  critical_color: !input color_critical
  led_toggle: !input led_mode_toggle
  # Precomputed values — variables: supports free-form Jinja2 without restrictions
  _m: "{{ states(trigger.entity_id) | float(0) }}"
  _max: "{{ metric_max_value | float }}"
  _low: "{{ _max * (low_threshold_percent | float / 100) }}"
  _mid: "{{ _max * (mid_threshold_percent | float / 100) }}"
  _high: "{{ _max * (high_threshold_percent | float / 100) }}"
  # zone: 0=cold→warm, 1=warm→hot, 2=hot→critical, 3=critical
  _zone: "{{ 3 if (_m | float) > (_high | float) else (2 if (_m | float) > (_mid | float) else (1 if (_m | float) > (_low | float) else 0)) }}"
  # interpolation ratio [0..1] within the current zone
  _ratio: >-
    {% set m = _m | float %}
    {% set z = _zone | int %}
    {% set low = _low | float %}
    {% set mid = _mid | float %}
    {% set high = _high | float %}
    {% if z == 0 %}{{ [[m / (low if low > 0 else 1), 0] | max, 1] | min }}
    {% elif z == 1 %}{{ [[(m - low) / ((mid - low) if (mid - low) > 0 else 1), 0] | max, 1] | min }}
    {% elif z == 2 %}{{ [[(m - mid) / ((high - mid) if (high - mid) > 0 else 1), 0] | max, 1] | min }}
    {% else %}1{% endif %}
  _rgb_r: >-
    {% set z = _zone | int %}
    {% set r = _ratio | float %}
    {% if z == 0 %}{{ (cold_color[0] + (warm_color[0] - cold_color[0]) * r) | round | int }}
    {% elif z == 1 %}{{ (warm_color[0] + (hot_color[0] - warm_color[0]) * r) | round | int }}
    {% elif z == 2 %}{{ (hot_color[0] + (critical_color[0] - hot_color[0]) * r) | round | int }}
    {% else %}{{ critical_color[0] }}{% endif %}
  _rgb_g: >-
    {% set z = _zone | int %}
    {% set r = _ratio | float %}
    {% if z == 0 %}{{ (cold_color[1] + (warm_color[1] - cold_color[1]) * r) | round | int }}
    {% elif z == 1 %}{{ (warm_color[1] + (hot_color[1] - warm_color[1]) * r) | round | int }}
    {% elif z == 2 %}{{ (hot_color[1] + (critical_color[1] - hot_color[1]) * r) | round | int }}
    {% else %}{{ critical_color[1] }}{% endif %}
  _rgb_b: >-
    {% set z = _zone | int %}
    {% set r = _ratio | float %}
    {% if z == 0 %}{{ (cold_color[2] + (warm_color[2] - cold_color[2]) * r) | round | int }}
    {% elif z == 1 %}{{ (warm_color[2] + (hot_color[2] - warm_color[2]) * r) | round | int }}
    {% elif z == 2 %}{{ (hot_color[2] + (critical_color[2] - hot_color[2]) * r) | round | int }}
    {% else %}{{ critical_color[2] }}{% endif %}

condition:
  - condition: template
    value_template: >
      {{
        trigger.to_state is not none
        and (trigger.to_state.state | float(none)) is not none
        and (metric_max_value | float(0)) > 0
      }}
  - condition: template
    value_template: >
      {{ led_toggle == {} or states(led_toggle) == 'on' }}

action:
  - service: light.turn_on
    target:
      entity_id: !input rgb_light
    data:
      rgb_color:
        - "{{ _rgb_r | int }}"
        - "{{ _rgb_g | int }}"
        - "{{ _rgb_b | int }}"

mode: single
